<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vaultfy · Video-scrub spike</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #05070d; color: #f4efe6; font-family: -apple-system, system-ui, sans-serif; }
  /* Tall scroll track; the hero sticks while you scroll through it */
  #track { height: 600vh; position: relative; }
  #stage {
    position: sticky; top: 0; height: 100vh; width: 100%;
    overflow: hidden; background: #05070d;
  }
  #hero-video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0; pointer-events: none;
    background: #05070d;
  }
  .grain { position:absolute; inset:0; z-index:1; pointer-events:none;
    background: radial-gradient(120% 80% at 50% 10%, rgba(0,0,0,0) 40%, rgba(0,0,0,.35) 100%); }
  .caption {
    position: absolute; left: 0; right: 0; bottom: 12%; z-index: 2; text-align: center;
    font-size: clamp(28px, 6vw, 64px); font-weight: 300; letter-spacing: .02em;
    text-shadow: 0 2px 30px rgba(0,0,0,.6);
  }
  .eyebrow { position:absolute; top:6%; left:0; right:0; text-align:center; z-index:2;
    font-size: 12px; letter-spacing:.4em; text-transform:uppercase; opacity:.7; }
  /* diagnostics */
  #hud {
    position: fixed; top: 8px; left: 8px; z-index: 9; font: 11px/1.4 ui-monospace, monospace;
    background: rgba(0,0,0,.55); padding: 8px 10px; border-radius: 8px; white-space: pre;
    backdrop-filter: blur(6px);
  }
  #after { height: 120vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(#05070d, #0b1020); font-size: 24px; font-weight: 300; opacity:.8; }
  #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    z-index: 20; background: #05070d; font-size: 13px; letter-spacing: .3em; text-transform: uppercase; }
</style>
</head>
<body>
  <div id="loading">Loading hero…</div>
  <div id="hud">init…</div>

  <div id="track">
    <div id="stage">
      <video id="hero-video" muted playsinline preload="auto" disablepictureinpicture></video>
      <div class="grain"></div>
      <div class="eyebrow">Video-scrub spike · scroll to test</div>
      <div class="caption" id="caption">Sky</div>
    </div>
  </div>
  <div id="after">If this scrolled buttery-smooth on your phone, video-scrub is the answer.</div>

<script>
(() => {
  const isMobile = window.matchMedia('(max-width: 1023px)').matches;
  const src = isMobile ? './assets/hero/day-mobile.mp4' : './assets/hero/day-desktop.mp4';

  const video = document.getElementById('hero-video');
  const hud = document.getElementById('hud');
  const caption = document.getElementById('caption');
  const loading = document.getElementById('loading');
  const track = document.getElementById('track');

  video.src = src;

  // Chapter captions keyed by scroll progress (0..1)
  const chapters = [
    [0.00, 'Sky'], [0.12, 'Residences'], [0.30, 'Horology'],
    [0.48, 'Private Events'], [0.66, 'Automotive'], [0.80, 'Yachts'], [0.90, 'Aviation'],
  ];
  const chapterFor = (p) => { let l = chapters[0][1]; for (const [u, n] of chapters) { if (p >= u) l = n; } return l; };

  let duration = 0;
  let targetT = 0;     // where scroll says the video should be
  let currentT = 0;    // smoothed playhead (lerp -> feels like scrub smoothing)
  let ready = false;
  let lastPaint = performance.now();
  let fps = 0, seeks = 0, painted = 0;

  // FPS from actual painted video frames (the real smoothness signal)
  const onFrame = () => {
    const now = performance.now();
    const dt = now - lastPaint; lastPaint = now;
    fps = dt > 0 ? Math.round(1000 / dt) : fps;
    painted++;
    if ('requestVideoFrameCallback' in video) video.requestVideoFrameCallback(onFrame);
  };

  function progress() {
    const max = track.scrollHeight - window.innerHeight;
    return max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;
  }

  function tick() {
    if (ready) {
      const p = progress();
      targetT = p * duration;
      // Smooth toward the target so fast flicks don't thrash the seeker.
      currentT += (targetT - currentT) * 0.18;
      if (Math.abs(targetT - currentT) < 0.004) currentT = targetT;
      // Only seek when it actually moved a meaningful amount.
      if (Math.abs(video.currentTime - currentT) > 0.008) {
        video.currentTime = currentT; seeks++;
      }
      caption.textContent = chapterFor(p);
      hud.textContent =
        `src: ${isMobile ? 'mobile' : 'desktop'} ${video.videoWidth}x${video.videoHeight}\n` +
        `progress: ${(p*100).toFixed(1)}%\n` +
        `videoFPS: ${fps}  seeks:${seeks} painted:${painted}\n` +
        `t: ${currentT.toFixed(2)} / ${duration.toFixed(2)}s`;
    }
    requestAnimationFrame(tick);
  }

  video.addEventListener('loadedmetadata', () => {
    duration = video.duration || 6.4;
  });
  // Wait until enough is buffered to seek smoothly from the start.
  video.addEventListener('canplaythrough', start, { once: true });
  video.addEventListener('loadeddata', () => { setTimeout(start, 400); }, { once: true });

  function start() {
    if (ready) return;
    ready = true;
    duration = video.duration || 6.4;
    video.currentTime = 0;
    loading.style.display = 'none';
    if ('requestVideoFrameCallback' in video) video.requestVideoFrameCallback(onFrame);
    else hud.textContent += '\n(no requestVideoFrameCallback)';
  }

  window.addEventListener('scroll', () => {}, { passive: true });
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
